name: Build Wheels

on:
  push:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  TORCH_VERSION: "2.10"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["12.8.0", "13.0.2"]
        runner:
          - runs-on: ubuntu-latest
            arch: x86_64
          - runs-on: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner.runs-on }}
    container:
      image: nvidia/cuda:${{ matrix.cuda_version }}-devel-ubuntu22.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: requirements.txt

      - name: Setup Python environment
        run: |
          uv venv --python 3.12 --seed
          echo "$(pwd)/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=$(pwd)/.venv" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          CUDA_SHORT=$(echo "${{ matrix.cuda_version }}" | cut -d. -f1,2 | tr -d '.')
          uv pip install -r requirements.txt --torch-backend=cu${CUDA_SHORT}

      - name: Build wheel
        env:
          MAX_JOBS: "2"
          NVCC_THREADS: "2"
        run: bash build_fa3.sh

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-cu${{ matrix.cuda_version }}-${{ matrix.runner.arch }}
          path: build/*.whl

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
